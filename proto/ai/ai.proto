syntax = "proto3";

package ai;

option go_package = "github.com/qiwang/book-e-commerce-micro/proto/ai";

service AIService {
    rpc GetRecommendations(RecommendRequest) returns (RecommendResponse);
    rpc ChatWithLibrarian(ChatRequest) returns (ChatResponse);
    rpc StreamChat(ChatRequest) returns (stream ChatStreamChunk);
    rpc GenerateBookSummary(SummaryRequest) returns (SummaryResponse);
    rpc SmartSearch(SmartSearchRequest) returns (SmartSearchResponse);
    rpc AnalyzeReadingTaste(TasteRequest) returns (TasteResponse);
    rpc GetSimilarBooks(SimilarBooksRequest) returns (SimilarBooksResponse);
    // Scan BookService for books missing vectors (or all if force) and upsert into the vector DB.
    rpc BackfillEmbeddings(BackfillEmbeddingsRequest) returns (BackfillEmbeddingsResponse);
}

message RecommendRequest {
    uint64 user_id = 1;
    string context = 2;
    int32 limit = 3;
}

message BookRecommendation {
    string book_id = 1;
    string title = 2;
    string author = 3;
    string cover_url = 4;
    double price = 5;
    string category = 6;
    double score = 7;
    string reason = 8;
}

message RecommendResponse {
    repeated BookRecommendation recommendations = 1;
}

message ChatRequest {
    uint64 user_id = 1;
    string message = 2;
    string session_id = 3;
    // When the previous reply asked for HITL, resend the same message with these filled.
    string hitl_confirm_action_id = 4;
    string hitl_confirm_secret = 5;
}

message ChatResponse {
    string reply = 1;
    string session_id = 2;
    repeated BookRecommendation suggested_books = 3;
    repeated ActionSuggestion actions = 4;
    bool hitl_pending = 5;
    string hitl_action_id = 6;
    string hitl_secret = 7;
    string hitl_summary = 8;
}

message ActionSuggestion {
    string type = 1;
    string label = 2;
    string payload = 3;
}

// Streaming chat: server sends a sequence of chunks to the client.
//   type="delta"    → incremental text token
//   type="metadata" → session_id, suggested_books, actions (sent once at end)
//   type="error"    → error message
//   type="done"     → stream finished
message ChatStreamChunk {
    string type = 1;
    string delta = 2;
    string session_id = 3;
    repeated BookRecommendation suggested_books = 4;
    repeated ActionSuggestion actions = 5;
    string error = 6;
    bool hitl_pending = 7;
    string hitl_action_id = 8;
    string hitl_secret = 9;
    string hitl_summary = 10;
}

message SummaryRequest {
    string book_id = 1;
    bool force_regenerate = 2;
}

message SummaryResponse {
    string book_id = 1;
    string title = 2;
    string summary = 3;
    repeated string key_themes = 4;
    string target_audience = 5;
    string reading_difficulty = 6;
    int32 estimated_reading_hours = 7;
}

message SmartSearchRequest {
    string query = 1;
    uint64 user_id = 2;
    int32 limit = 3;
}

message SmartSearchResponse {
    repeated BookRecommendation results = 1;
    string interpreted_query = 2;
    map<string, string> extracted_filters = 3;
}

message TasteRequest {
    uint64 user_id = 1;
}

message TasteResponse {
    uint64 user_id = 1;
    repeated string top_categories = 2;
    repeated string top_authors = 3;
    repeated string personality_tags = 4;
    string taste_summary = 5;
    repeated BookRecommendation discovery_suggestions = 6;
}

message SimilarBooksRequest {
    string book_id = 1;
    int32 limit = 2;
}

message SimilarBooksResponse {
    string book_id = 1;
    repeated BookRecommendation similar_books = 2;
}

message BackfillEmbeddingsRequest {
    // When true, re-embed even if the vector store already has this book_id.
    bool force = 1;
    // 0: full scan in a background goroutine (RPC returns immediately).
    // >0: run synchronously in this call and stop after at most this many successful embeddings (smoke test).
    int32 sync_limit = 2;
    // Abort after this many failures (HasEmbedding / OpenAI / upsert). 0 = default 200.
    int32 max_errors = 3;
}

message BackfillEmbeddingsResponse {
    bool background = 1;
    int32 embedded = 2;
    int32 skipped = 3;
    int32 errors = 4;
    string message = 5;
}
