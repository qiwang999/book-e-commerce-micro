syntax = "proto3";

package user;

option go_package = "github.com/qiwang/book-e-commerce-micro/proto/user";

service UserService {
    rpc Register(RegisterRequest) returns (AuthResponse);
    rpc Login(LoginRequest) returns (AuthResponse);
    rpc SendVerificationCode(SendCodeRequest) returns (CommonResponse);
    rpc GetProfile(GetProfileRequest) returns (UserProfile);
    rpc UpdateProfile(UpdateProfileRequest) returns (CommonResponse);
    rpc GetUserPreferences(GetPreferencesRequest) returns (UserPreferences);
    rpc UpdateUserPreferences(UpdatePreferencesRequest) returns (CommonResponse);
    rpc GetAddress(GetAddressRequest) returns (Address);
    rpc ListAddresses(ListAddressesRequest) returns (AddressListResponse);
    rpc CreateAddress(CreateAddressRequest) returns (Address);
    rpc UpdateAddress(UpdateAddressRequest) returns (Address);
    rpc DeleteAddress(DeleteAddressRequest) returns (CommonResponse);
    rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
    string name = 3;
    string code = 4;
}

message SendCodeRequest {
    string email = 1;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message AuthResponse {
    int64 code = 1;
    string message = 2;
    string token = 3;
    UserInfo user = 4;
}

message UserInfo {
    uint64 id = 1;
    string email = 2;
    string name = 3;
    string avatar_url = 4;
    string role = 5;
}

message GetProfileRequest {
    uint64 user_id = 1;
}

message UserProfile {
    uint64 user_id = 1;
    string email = 2;
    string name = 3;
    string avatar_url = 4;
    string phone = 5;
    int32 gender = 6;
    string birthday = 7;
    repeated string favorite_categories = 8;
    repeated string favorite_authors = 9;
    repeated string reading_preferences = 10;
}

message UpdateProfileRequest {
    uint64 user_id = 1;
    string name = 2;
    string avatar_url = 3;
    string phone = 4;
    int32 gender = 5;
    string birthday = 6;
}

message GetPreferencesRequest {
    uint64 user_id = 1;
}

message UserPreferences {
    uint64 user_id = 1;
    repeated string favorite_categories = 2;
    repeated string favorite_authors = 3;
    repeated string reading_preferences = 4;
}

message UpdatePreferencesRequest {
    uint64 user_id = 1;
    repeated string favorite_categories = 2;
    repeated string favorite_authors = 3;
    repeated string reading_preferences = 4;
}

message GetAddressRequest {
    uint64 address_id = 1;
}

message ListAddressesRequest {
    uint64 user_id = 1;
}

message AddressListResponse {
    repeated Address addresses = 1;
}

message CreateAddressRequest {
    uint64 user_id = 1;
    string name = 2;
    string phone = 3;
    string province = 4;
    string city = 5;
    string district = 6;
    string detail = 7;
    bool is_default = 8;
}

message UpdateAddressRequest {
    uint64 address_id = 1;
    uint64 user_id = 2;
    string name = 3;
    string phone = 4;
    string province = 5;
    string city = 6;
    string district = 7;
    string detail = 8;
    bool is_default = 9;
}

message DeleteAddressRequest {
    uint64 address_id = 1;
    uint64 user_id = 2;
}

message Address {
    uint64 id = 1;
    uint64 user_id = 2;
    string name = 3;
    string phone = 4;
    string province = 5;
    string city = 6;
    string district = 7;
    string detail = 8;
    bool is_default = 9;
}

message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    bool valid = 1;
    uint64 user_id = 2;
    string role = 3;
}

message CommonResponse {
    int64 code = 1;
    string message = 2;
}
