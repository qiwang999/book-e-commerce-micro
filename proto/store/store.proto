syntax = "proto3";

package store;

option go_package = "github.com/qiwang/book-e-commerce-micro/proto/store";

service StoreService {
    rpc ListStores(ListStoresRequest) returns (StoreListResponse);
    rpc GetStoreDetail(GetStoreDetailRequest) returns (Store);
    rpc GetNearestStore(GetNearestStoreRequest) returns (Store);
    rpc GetStoresInRadius(GetStoresInRadiusRequest) returns (StoreListResponse);
    rpc CreateStore(CreateStoreRequest) returns (Store);
    rpc UpdateStore(UpdateStoreRequest) returns (Store);
}

message ListStoresRequest {
    string city = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message GetStoreDetailRequest {
    uint64 store_id = 1;
}

message GetNearestStoreRequest {
    double latitude = 1;
    double longitude = 2;
}

message GetStoresInRadiusRequest {
    double latitude = 1;
    double longitude = 2;
    double radius_km = 3;
    int32 limit = 4;
}

message CreateStoreRequest {
    string name = 1;
    string description = 2;
    string address = 3;
    string city = 4;
    string district = 5;
    string phone = 6;
    double latitude = 7;
    double longitude = 8;
    string business_hours = 9;
}

message UpdateStoreRequest {
    uint64 id = 1;
    string name = 2;
    string description = 3;
    string address = 4;
    string phone = 5;
    string business_hours = 6;
    int32 status = 7;
}

message Store {
    uint64 id = 1;
    string name = 2;
    string description = 3;
    string address = 4;
    string city = 5;
    string district = 6;
    string phone = 7;
    double latitude = 8;
    double longitude = 9;
    string business_hours = 10;
    int32 status = 11;
    string image_url = 12;
    double distance_km = 13;
}

message StoreListResponse {
    repeated Store stores = 1;
    int64 total = 2;
}
