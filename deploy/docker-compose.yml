# 3.9+：depends_on 可对一次性 config-init 使用 service_completed_successfully（否则部分编排器在 init 已退出后仍不启动业务容器）
version: '3.9'

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  consul:
    image: consul:1.15
    container_name: bookhive-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - consul-data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: bookhive-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bookhive123
      MYSQL_DATABASE: bookhive
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbookhive123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  mongodb:
    image: mongo:7.0
    container_name: bookhive-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: bookhive
      MONGO_INITDB_ROOT_PASSWORD: bookhive123
      MONGO_INITDB_DATABASE: bookhive
    volumes:
      - mongo-data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js
    # 启用 MONGO_INITDB_ROOT_* 后必须用管理员账号探测，否则 healthcheck 永久失败
    healthcheck:
      test: ["CMD", "mongosh", "-u", "bookhive", "-p", "bookhive123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # 从 Open Library JSON API 按 ISBN 拉取真实元数据；--if-empty 避免覆盖已有 books（需镜像内带 openlibrary-seed，见 make build-linux）
  mongo-seed-books:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-mongo-seed-books
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./mongo/seed-isbns.txt:/app/seed-isbns.txt:ro
    command:
      - /app/openlibrary-seed
      - "-mongo-uri=mongodb://bookhive:bookhive123@mongodb:27017/?authSource=admin&authMechanism=SCRAM-SHA-256"
      - -database=bookhive
      - -isbns-file=/app/seed-isbns.txt
      - -if-empty=true
    restart: 'no'

  redis:
    image: redis:7-alpine
    container_name: bookhive-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass bookhive123
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bookhive123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bookhive-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bookhive
      RABBITMQ_DEFAULT_PASS: bookhive123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: bookhive-es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  minio:
    image: minio/minio:latest
    container_name: bookhive-minio
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: bookhive
      MINIO_ROOT_PASSWORD: bookhive123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: bookhive-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 15s

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: bookhive-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # 多架构镜像（amd64 + arm64）；ARM Mac / Apple Silicon 请用此版本，勿用仅 amd64 的旧 tag（QEMU 易崩溃）
  milvus:
    image: milvusdb/milvus:v2.5.12
    container_name: bookhive-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  # Milvus Web GUI（与 Milvus 同网络，MILVUS_URL 必须用容器可达主机名，不能用 127.0.0.1）
  # 浏览器: http://localhost:8000 。若其它服务已在跑、只需补启 Attu: podman-compose up -d --no-deps attu
  # 勿用 service_healthy：Milvus 首次启动可达数分钟，会拖住整条 compose up 且无输出，像「卡死」；Attu 会随 restart 重试连 Milvus。
  attu:
    image: zilliz/attu:v2.5
    container_name: bookhive-attu
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus
    restart: unless-stopped

  # Order sharding MySQL instances
  mysql-order:
    image: mysql:8.0
    container_name: bookhive-mysql-order
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bookhive123
    volumes:
      - mysql-order-data:/var/lib/mysql
      - ./mysql/init_order_shard.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbookhive123"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  mysql-order-2:
    image: mysql:8.0
    container_name: bookhive-mysql-order-2
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bookhive123
    volumes:
      - mysql-order-2-data:/var/lib/mysql
      - ./mysql/init_order_shard_2.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbookhive123"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # Inventory sharding MySQL instances
  mysql-inventory:
    image: mysql:8.0
    container_name: bookhive-mysql-inventory
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bookhive123
    volumes:
      - mysql-inventory-data:/var/lib/mysql
      - ./mysql/init_inventory_shard.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbookhive123"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  mysql-inventory-2:
    image: mysql:8.0
    container_name: bookhive-mysql-inventory-2
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bookhive123
    volumes:
      - mysql-inventory-2-data:/var/lib/mysql
      - ./mysql/init_inventory_shard_2.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbookhive123"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ============================================================
  # Config Init: push config to Consul KV, then exit
  # ============================================================
  config-init:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-config-init
    depends_on:
      - consul
    environment:
      CONSUL_ADDRESS: consul:8500
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
    command: >
      sh -c "
        echo 'Waiting for Consul...'
        until curl -sf http://consul:8500/v1/status/leader | grep -q '\"'; do sleep 2; done
        echo 'Consul ready, pushing config...'
        ./config-init -consul=consul:8500 -file=/app/config.docker.yaml
      "
    restart: "no"

  # ============================================================
  # Application Services
  # ============================================================
  user-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-user
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mysql:
        condition: service_started
      redis:
        condition: service_started
    command: >
      sh -c "
        echo 'Waiting for config-init & MySQL...'
        sleep 10
        ./user-service
      "

  store-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-store
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mysql:
        condition: service_started
      redis:
        condition: service_started
    command: >
      sh -c "
        sleep 10
        ./store-service
      "

  book-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-book
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mongo-seed-books:
        condition: service_completed_successfully
      mysql:
        condition: service_started
      elasticsearch:
        condition: service_started
      mongodb:
        condition: service_started
    command: >
      sh -c "
        sleep 15
        ./book-service
      "

  inventory-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-inventory
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mysql:
        condition: service_started
      mysql-inventory:
        condition: service_started
      mysql-inventory-2:
        condition: service_started
      redis:
        condition: service_started
    command: >
      sh -c "
        sleep 15
        ./inventory-service
      "

  cart-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-cart
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command: >
      sh -c "
        sleep 10
        ./cart-service
      "

  order-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-order
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mysql-order:
        condition: service_started
      mysql-order-2:
        condition: service_started
      rabbitmq:
        condition: service_started
    command: >
      sh -c "
        sleep 15
        ./order-service
      "

  payment-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-payment
    restart: unless-stopped
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mysql:
        condition: service_started
      rabbitmq:
        condition: service_started
    command: >
      sh -c "
        sleep 15
        ./payment-service
      "

  ai-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-ai
    restart: unless-stopped
    # 不在此容器上映射宿主机端口（Podman/macOS 上易触发 internal libpod error）；由 ai-grpc-publish 转发
    expose:
      - "9008"
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      milvus:
        condition: service_started
    command: >
      sh -c "
        sleep 20
        ./ai-service
      "

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bookhive-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CONSUL_ADDRESS: consul:8500
    depends_on:
      config-init:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      store-service:
        condition: service_started
      book-service:
        condition: service_started
      inventory-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      ai-service:
        condition: service_started
    command: >
      sh -c "
        echo 'Waiting for backend services...'
        sleep 25
        ./api-gateway
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  consul-data:
  minio-data:
  mysql-data:
  mysql-order-data:
  mysql-order-2-data:
  mysql-inventory-data:
  mysql-inventory-2-data:
  mongo-data:
  redis-data:
  rabbitmq-data:
  es-data:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
