app:
  name: bookhive
  version: 1.0.0

consul:
  address: consul:8500

mysql:
  host: mysql
  port: 3306
  user: root
  password: bookhive123
  database: bookhive
  max_open_conns: 100
  max_idle_conns: 20

mongodb:
  uri: mongodb://bookhive:bookhive123@mongodb:27017
  database: bookhive

redis:
  address: redis:6379
  password: bookhive123
  db: 0

rabbitmq:
  url: amqp://bookhive:bookhive123@rabbitmq:5672/

elasticsearch:
  addresses:
    - http://elasticsearch:9200

milvus:
  address: milvus:19530

minio:
  endpoint: minio:9000
  access_key: bookhive
  secret_key: bookhive123
  bucket: bookhive
  use_ssl: false

jwt:
  secret: bookhive-jwt-secret-key-2024
  expire_hours: 72

# 邮件发信（验证码等）：生产环境请填写真实 SMTP，勿将含密码的副本提交到公开仓库
email:
  host: smtp.example.com
  port: 465
  username: ""
  password: ""
  from: "BookHive <noreply@example.com>"

# AI：请填写 API Key；可通过 OpenAI 兼容网关（base_url 需以 /v1 结尾）
openai:
  api_key: ""
  model: deepseek-v3.2
  embedding_model: text-embedding-3-small
  base_url: https://api.openai.com/v1

services:
  gateway:
    http_port: 8080
    host: api-gateway
  user:
    grpc_port: 9001
    host: user-service
  store:
    grpc_port: 9002
    host: store-service
  book:
    grpc_port: 9003
    host: book-service
  inventory:
    grpc_port: 9004
    host: inventory-service
  cart:
    grpc_port: 9005
    host: cart-service
  order:
    grpc_port: 9006
    host: order-service
  payment:
    grpc_port: 9007
    host: payment-service
  ai:
    grpc_port: 9008
    host: ai-service

sharding:
  order:
    enabled: true
    shards:
      - host: mysql-order
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_order_0
        max_open_conns: 50
        max_idle_conns: 10
      - host: mysql-order
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_order_1
        max_open_conns: 50
        max_idle_conns: 10
      - host: mysql-order-2
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_order_2
        max_open_conns: 50
        max_idle_conns: 10
      - host: mysql-order-2
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_order_3
        max_open_conns: 50
        max_idle_conns: 10
  inventory:
    enabled: true
    shards:
      - host: mysql-inventory
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_inventory_0
        max_open_conns: 50
        max_idle_conns: 10
      - host: mysql-inventory
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_inventory_1
        max_open_conns: 50
        max_idle_conns: 10
      - host: mysql-inventory-2
        port: 3306
        user: root
        password: bookhive123
        database: bookhive_inventory_2
        max_open_conns: 50
        max_idle_conns: 10
      - host: mysql-inventory-2
        port: 3306
